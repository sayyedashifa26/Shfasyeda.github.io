@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root{--black:#0a0a0a;--black2:#111;--black3:#1a1a1a;--orange:#FF6B00;--orange2:#FF8C38;--white:#F5F0E8;--gray:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 8% 18%,rgba(255,255,255,.45) 0%,transparent 100%),radial-gradient(1px 1px at 25% 65%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 45% 8%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 68% 78%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 82% 33%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 90% 68%,rgba(255,255,255,.35) 0%,transparent 100%);}
section,main{position:relative;z-index:1;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#0a0a0a;}::-webkit-scrollbar-thumb{background:#FF6B00;border-radius:3px;}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:rgba(10,10,10,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,107,0,0.12);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--orange);letter-spacing:-0.5px;text-decoration:none;}
.logo span{color:var(--white);}
.nav-links{display:flex;gap:6px;list-style:none;align-items:center;}
.nav-links a{color:var(--gray);text-decoration:none;font-size:0.85rem;font-weight:500;padding:7px 13px;border-radius:6px;transition:all 0.25s;}
.nav-links a:hover,.nav-links a.active{color:var(--white);background:rgba(255,107,0,0.1);}
.nav-links a.active{color:var(--orange);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:24px;height:2px;background:var(--orange);border-radius:2px;}
.mobile-menu{display:none;position:fixed;inset:0;z-index:199;background:rgba(10,10,10,0.98);flex-direction:column;align-items:center;justify-content:center;gap:28px;}
.mobile-menu.open{display:flex;}
.mobile-menu a{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700;color:var(--white);text-decoration:none;}
.mobile-menu a.active,.mobile-menu a:hover{color:var(--orange);}
.close-btn{position:absolute;top:22px;right:36px;font-size:2rem;color:var(--orange);background:none;border:none;cursor:pointer;}
/* HERO */
#home{min-height:100vh;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:120px 60px 80px;max-width:1200px;margin:0 auto;position:relative;}
.greeting{font-size:1.3rem;margin-bottom:10px;animation:fadeUp .7s ease both;}
.wave{display:inline-block;animation:wave 2s ease-in-out infinite;transform-origin:70% 70%;}
.hero-name{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.6rem,6vw,5rem);line-height:1.05;margin-bottom:18px;animation:fadeUp .7s .1s ease both;}
.hero-name .hl{color:var(--orange);}
.typewriter{font-size:clamp(1rem,2.5vw,1.4rem);color:var(--orange2);font-weight:300;margin-bottom:40px;min-height:2.2rem;animation:fadeUp .7s .2s ease both;}
.cursor{border-right:2px solid var(--orange);animation:blink 1s step-end infinite;}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp .7s .3s ease both;}
.btn-primary{background:var(--orange);color:#000;padding:13px 28px;border-radius:6px;font-weight:700;font-size:0.9rem;text-decoration:none;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;}
.btn-primary:hover{background:var(--orange2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,0,0.4);}
.btn-outline{background:transparent;color:var(--orange);padding:12px 28px;border-radius:6px;font-weight:700;font-size:0.9rem;text-decoration:none;border:2px solid var(--orange);transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;}
.btn-outline:hover{background:rgba(255,107,0,0.15);transform:translateY(-2px);}
.hero-illus{position:absolute;right:40px;bottom:40px;width:min(460px,44vw);opacity:.92;animation:floatY 6s ease-in-out infinite;}
/* FOOTER */
footer{background:var(--black2);border-top:1px solid rgba(255,107,0,0.1);padding:36px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;position:relative;z-index:1;}
.footer-left p{font-size:0.85rem;color:var(--gray);line-height:1.6;}
.footer-left .fn{color:var(--orange);}
.footer-socials{display:flex;gap:18px;}
.footer-socials a{width:40px;height:40px;background:var(--black3);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:1rem;text-decoration:none;border:1px solid rgba(255,107,0,0.15);transition:all 0.3s;}
.footer-socials a:hover{background:var(--orange);color:#000;transform:translateY(-3px);}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes wave{0%,100%{transform:rotate(0)}25%{transform:rotate(20deg)}75%{transform:rotate(-10deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes f1{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes f2{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes f3{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes f4{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

@media(max-width:900px){nav{padding:14px 24px;}.nav-links{display:none;}.hamburger{display:flex;}#home{padding:110px 24px 380px;align-items:center;text-align:center;}.hero-illus{right:50%;transform:translateX(50%);bottom:20px;width:min(340px,88vw);animation:none;}.hero-btns{justify-content:center;}footer{flex-direction:column;align-items:center;text-align:center;padding:28px 20px;}}

<script>
const roles=["Cloud Engineer","Full Stack Developer","AWS Enthusiast","UI/UX Designer"];
let ri=0,ci=0,del=false;
const el=document.getElementById('tw');
function type(){const w=roles[ri];if(!del){el.textContent=w.slice(0,++ci);if(ci===w.length){del=true;setTimeout(type,1800);return;}}else{el.textContent=w.slice(0,--ci);if(ci===0){del=false;ri=(ri+1)%roles.length;}}setTimeout(type,del?60:100);}
type();
</script>
<!-- Shifa Portfolio Tracker -->
<script>
(function(){
  const KEY='shifa_analytics_v1';
  function getData(){try{return JSON.parse(localStorage.getItem(KEY))||dd();}catch{return dd();}}
  function dd(){return{visitors:0,pageviews:0,clicks:0,totalTime:0,sessionCount:0,pages:{},clickTargets:{},devices:{mobile:0,desktop:0,tablet:0},log:[]};}
  function save(d){localStorage.setItem(KEY,JSON.stringify(d));}
  function dev(){var ua=navigator.userAgent;if(/tablet|ipad/i.test(ua))return'tablet';if(/mobile|iphone|android/i.test(ua))return'mobile';return'desktop';}
  function log(d,icon,type,text){d.log.unshift({icon,type,text,time:new Date().toLocaleTimeString()});if(d.log.length>50)d.log.pop();}
  
  // Page view
  var page=document.title.replace(/[^a-zA-Z]/g,'').slice(0,15)||location.pathname.split('/').pop()||'Home';
  var pages={'index':'Home','about':'About','projects':'Projects','experience':'Experience','resume':'Resume'};
  var pg=pages[page.toLowerCase()]||page;
  var d=getData();d.pageviews++;d.visitors++;
  d.pages[pg]=(d.pages[pg]||0)+1;
  var dv=dev();d.devices[dv]=(d.devices[dv]||0)+1;
  log(d,'👁️','visit','New visit to '+pg);
  save(d);

  // Click tracking
  var start=Date.now();
  document.addEventListener('click',function(e){
    var el=e.target.closest('a,button');
    if(!el)return;
    var t=el.textContent.trim().slice(0,20)||el.href||'Link';
    var d2=getData();d2.clicks++;
    d2.clickTargets[t]=(d2.clickTargets[t]||0)+1;
    log(d2,'🖱️','click','Clicked '+t);
    save(d2);
  });

  // Session time
  window.addEventListener('beforeunload',function(){
    var dur=Math.round((Date.now()-start)/1000);
    var d3=getData();d3.totalTime+=dur;d3.sessionCount++;
    log(d3,'⏱️','nav','Session ended — '+dur+'s');
    save(d3);
  });
})();
    </script>
